media:
  input: public
  output: /

content:
  - name: academics
    label: Academics
    type: collection
    path: src/content/academics
    filename: '{title}.mdx'
    view:
      fields: [title, subtitle, order]
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: subtitle, label: Subtitle, type: string }
      - { name: description, label: Description, type: text }
      - name: image
        label: Image
        type: object
        fields:
          - { name: src, label: Image, type: image }
          - { name: alt, label: Alt Text, type: string }
        options:
          path: src/content/academics/images
      - { name: order, label: Order, type: number }
      - { name: featured, label: Featured, type: boolean, default: true }
      - { name: body, label: Content, type: rich-text }

  - name: news
    label: News
    type: collection
    path: src/content/news
    view:
      fields: [title, date, categories, featured]
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: date, label: Date, type: date }
      - { name: seoDescription, label: SEO Description, type: string }
      - { name: excerpt, label: Excerpt, type: text }
      - name: image
        label: Image
        type: object
        fields:
          - { name: src, label: Image, type: image, default: "/social/og-default.jpg" }
          - { name: alt, label: Alt Text, type: string, default: "University of Michigan Robotics" }
      - name: categories
        label: Categories
        type: select
        list: true
        options:
          values:
            - { label: "Autonomous Vehicles", value: "autonomous-vehicles" }
            - { label: "Design & Soft Robotics", value: "design-soft-robotics" }
            - { label: "Human-Robot Interaction", value: "human-robot-interaction" }
            - { label: "Legged Robotics", value: "legged-robotics" }
            - { label: "Manufacturing Robotics", value: "manufacturing-robotics" }
            - { label: "Medical Robotics", value: "medical-robotics" }
            - { label: "Motion Planning & Control", value: "motion-planning-control" }
            - { label: "Multi-Robot Swarms", value: "multi-robot-swarms" }
            - { label: "Rehabilitation & Wearables", value: "rehabilitation-wearables" }
            - { label: "Robot Learning & Foundational Models", value: "robot-learning-foundational-models" }
            - { label: "Robot Perception", value: "robot-perception" }
            - { label: "Robotic Manipulation", value: "robotic-manipulation" }
            - { label: "Safe Autonomy", value: "safe-autonomy" }
            - { label: "Robotics Community", value: "robotics-community" }
      - { name: tags, label: Tags, type: string, list: true }
      - { name: author, label: Author, type: string }
      - { name: featured, label: Featured, type: boolean }
      - { name: body, label: Content, type: rich-text }
